name: Build Ardour on Windows

on:
  push:
    tags:
      - 'v*'  # 当推送 v1.0.0 这样的标签时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: |
          git
          pactoys
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-python
          mingw-w64-x86_64-aubio
          mingw-w64-x86_64-boost
          mingw-w64-x86_64-curl
          mingw-w64-x86_64-drmingw
          mingw-w64-x86_64-flac
          mingw-w64-x86_64-fftw
          mingw-w64-x86_64-fontconfig
          mingw-w64-x86_64-gtkmm
          mingw-w64-x86_64-libogg
          mingw-w64-x86_64-libgnomecanvas
          mingw-w64-x86_64-liblo
          mingw-w64-x86_64-lilv
          mingw-w64-x86_64-libxml2
          mingw-w64-x86_64-mcfgthreads
          mingw-w64-x86_64-pango
          mingw-w64-x86_64-pangomm
          mingw-w64-x86_64-rubberband
          mingw-w64-x86_64-libarchive
          mingw-w64-x86_64-serd
          mingw-w64-x86_64-sord
          mingw-w64-x86_64-taglib
          mingw-w64-x86_64-vamp-plugin-sdk
          mingw-w64-x86_64-libusb
    
    - name: Cache ASIO SDK
      id: cache-asio
      uses: actions/cache@v3
      with:
        path: asio-sdk.zip
        key: asio-sdk-1.0
    
    - name: Download ASIO SDK
      if: steps.cache-asio.outputs.cache-hit != 'true'
      run: |
        # 注意：ASIO SDK 需要从 Steinberg 官网下载，这里使用备用地址
        curl -L -o asio-sdk.zip "https://www.steinberg.net/asiosdk" 
        # 如果上述地址失效，你可能需要手动上传到某个地方或使用其他方式
    
    - name: Build PortAudio with ASIO
      shell: msys2 {0}
      run: |
        git clone https://github.com/PortAudio/portaudio.git
        cd portaudio
        mkdir -p build
        cd build
        cmake -DCMAKE_INSTALL_PREFIX=/mingw64 \
              -DPA_BUILD_SHARED_LIBS=ON \
              -DPA_USE_JACK=OFF \
              -DPA_USE_DS=ON \
              -DPA_USE_WMME=ON \
              -DPA_USE_WASAPI=ON \
              -DPA_USE_WDMKS=ON \
              -DPA_USE_ASIO=ON \
              -DASIO_SDK_ZIP_PATH=$GITHUB_WORKSPACE/asio-sdk.zip \
              -S .. -B .
        cmake --build . -j $(nproc)
        cmake --install .
    
    - name: Clone Ardour source
      shell: msys2 {0}
      run: |
        git clone https://github.com/ardour/ardour.git
        cd ardour
        # 可以切换到特定版本
        # git checkout <version-tag>
    
    - name: Patch Ardour source
      shell: msys2 {0}
      run: |
        cd ardour
        
        # 注释 Glib thread 相关代码
        sed -i '89,91s/^/\/\//' libs/pbd/pbd.cc
        sed -i '264,266s/^/\/\//' gtk2_ardour/main.cc
        
        # 修改 wscript 文件
        sed -i '679s/and bld.env\[.build_target.\] != .mingw//' gtk2_ardour/wscript
        sed -i '46s/and bld.env\[.build_target.\] != .mingw//' libs/audiographer/wscript
        
        # 修改根目录 wscript
        sed -i '545s/if re.search (.x86_64-w64., str(conf.env\[.CC.\])) is not None:/if re.search (.x86_64-w64., os.popen(str(conf.env\[.CC.\]\[0\]) + " -dumpmachine").read()) is not None:/' wscript
        
        # 修改 libs/ardour/wscript
        sed -i '510s/if re.search (.x86_64-w64., str(bld.env\[.CC.\])):/if re.search (.x86_64-w64., os.popen(str(bld.env\[.CC.\]\[0\]) + " -dumpmachine").read()):/' libs/ardour/wscript
    
    - name: Configure build
      shell: msys2 {0}
      env:
        CFLAGS: "-Wno-incompatible-pointer-types -mstackrealign"
        CXXFLAGS: "-mstackrealign"
      run: |
        cd ardour
        ./waf configure --with-backends=portaudio \
          --also-include=/mingw64/include/libusb-1.0 \
          --check-c-compiler=gcc \
          --check-cxx-compiler=g++ \
          --no-msvc-lazy \
          --cxx17 \
          --dist-target=mingw \
          --keepflags \
          --optimize \
          --ptformat \
          --prefix=/c/apps/ardour
    
    - name: Build Ardour
      shell: msys2 {0}
      run: |
        cd ardour
        # 第一次构建
        ./waf build -j $(nproc) || true  # 忽略可能的 Broken pipe 错误
        # 第二次构建
        ./waf build -j $(nproc)
    
    - name: Generate translations
      shell: msys2 {0}
      run: |
        cd ardour
        ./waf i18n_mo
    
    - name: Install Ardour
      shell: msys2 {0}
      run: |
        cd ardour
        ./waf install
    
    - name: Fix GTK theme engines
      shell: msys2 {0}
      run: |
        cd /c/apps/ardour/lib
        mkdir -p gtk-2.0
        if [ -d ardour/engines ]; then
          mv ardour/engines gtk-2.0/
          cd gtk-2.0/engines
          mv clearlooks.dll libclearlooks.dll 2>/dev/null || true
          mv clearlooks.dll.a libclearlooks.dll.a 2>/dev/null || true
        fi
    
    - name: Create portable package
      shell: bash
      run: |
        # 创建可移植的压缩包
        mkdir -p ardour-portable
        
        # 复制 Ardour 文件
        cp -r /c/apps/ardour/* ardour-portable/
        
        # 复制 MSYS2 运行时依赖
        mkdir -p ardour-portable/msys2-runtime
        cp /mingw64/bin/*.dll ardour-portable/ 2>/dev/null || true
        cp /usr/bin/msys-2.0.dll ardour-portable/ 2>/dev/null || true
        
        # 创建启动脚本
        cat > ardour-portable/start-ardour.bat << 'EOF'
        @echo off
        set PATH=%~dp0;%~dp0\bin;%PATH%
        %~dp0\bin\ardour.exe %*
        EOF
        
        # 创建压缩包
        VERSION=$(cd ardour && git describe --tags --always 2>/dev/null || echo "build")
        ZIP_NAME="ardour-windows-${VERSION}.zip"
        zip -r $ZIP_NAME ardour-portable/
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ardour-windows-build
        path: ${{ env.ZIP_NAME }}
        retention-days: 7
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ZIP_NAME }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
